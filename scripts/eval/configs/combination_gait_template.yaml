# Gait-scheme template for scripts/eval/task_combination_eval.py — copy and edit:
#     python scripts/eval/task_combination_eval.py combination_gait_template

eval_name: combination_gait
task_scheme: gait        # gait bits (two_leg, one_leg, unused); the default
date_suffix: true

ep_time: 10
modulate_period: 3
episodes_per_combo: 5000
episode_chunk: 100
seed_base: 42

# --- combinations (gait units) ---
# Same gait-unit schema as elsewhere. walk + tilt is a two-leg gait with BOTH a nonzero
# velocity range and a nonzero tilt range (it has no single expert → RL-driven).
task_combinations:
  - { name: walk_fwd+tilt, label: "walk forward + tilt",  gait: [1, 0], cmd_vel_range: [0.0, 5.0],  cmd_tilt_range: [-0.75, 0.75] }
  - { name: walk_bwd+tilt, label: "walk backward + tilt", gait: [1, 0], cmd_vel_range: [-5.0, 0.0], cmd_tilt_range: [-0.75, 0.75] }

only_models: null

# kind: sb3 (PPO.load) | torch (StudentModel) | hybrid (averaged-expert baseline, gait routing).
models:
  - name: ppo_bc_gait/combination/2.0.0
    kind: sb3
    ref: ppo_bc_gait/combination/2.0.0/final.zip
    desc: "PPO+BC gait walk+tilt combination (our method)"

  - name: rudin/combination/2.0.0
    kind: sb3
    ref: rudin/combination/2.0.0/final.zip
    desc: "Rudin RLFT gait walk+tilt combination"

  - name: hybrid
    kind: hybrid
    ref: null
    desc: "Averaged-expert baseline (gait routing; no true combination expert)"
